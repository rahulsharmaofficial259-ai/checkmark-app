<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckMark Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans p-4">
    <div id="app" class="max-w-3xl mx-auto mt-2">
      
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow border border-gray-200">
            <h1 class="text-2xl font-extrabold text-indigo-600">✓ CheckMark</h1>
            <button id="logoutBtn" class="hidden text-sm bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded shadow transition">Logout</button>
        </div>

        <div id="auth" class="bg-white p-6 rounded-lg shadow border border-gray-200 max-w-sm mx-auto mt-10">
            <h2 class="text-xl mb-4 font-bold text-center text-gray-700">Login / Sign Up</h2>
            <input id="email" type="email" placeholder="Email Address" class="w-full mb-3 p-3 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <input id="pass" type="password" placeholder="Password" class="w-full mb-4 p-3 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <div class="flex gap-3">
                <button id="loginBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-3 rounded transition">Login</button>
                <button id="signupBtn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold p-3 rounded transition">Sign Up</button>
            </div>
            <p id="msg" class="text-red-500 text-sm mt-4 text-center font-medium"></p>
        </div>

        <div id="dash" class="hidden">
            <div class="bg-white p-4 rounded-lg shadow mb-6 flex flex-col sm:flex-row gap-3 border border-gray-200">
                <input id="task" type="text" placeholder="Add diet, exercise, or task..." class="flex-1 p-3 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <select id="cat" class="p-3 border rounded bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option>Diet</option>
                    <option>Workout</option>
                    <option>Tasks</option>
                    <option>Study</option>
                    <option>Work</option>
                </select>
                <button id="addBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-3 rounded transition">Add</button>
            </div>

            <div id="list" class="grid sm:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const sup = window.supabase.createClient('https://uqduseeiircpffhrabhr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxZHVzZWVpaXJjcGZmaHJhYmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MTcxMDcsImV4cCI6MjA5ODI5MzEwN30.4DUqtKrrKUj3RYSp9X_StQI94IosNZg5L1AFB81ZCMo');
        
        let user = null;
        let profile = { categories: ["Diet", "Workout", "Tasks", "Study", "Work"], logs: [] };

        const $ = id => document.getElementById(id);
        const show = (id, visible) => $(id).style.display = visible ? 'block' : 'none';

        // Check Login Status on Load
        async function init() {
            const { data: { session } } = await sup.auth.getSession();
            if (session) { 
                user = session.user; 
                show('auth', false); 
                show('dash', true); 
                show('logoutBtn', true); 
                loadData(); 
            } else { 
                show('auth', true); 
                show('dash', false); 
                show('logoutBtn', false); 
            }
        }

        // Login Logic
        $('loginBtn').onclick = async () => {
            $('msg').innerText = "Connecting...";
            const { error } = await sup.auth.signInWithPassword({ email: $('email').value, password: $('pass').value });
            if (error) $('msg').innerText = error.message; else init();
        };

        // Signup Logic
        $('signupBtn').onclick = async () => {
            $('msg').innerText = "Creating account...";
            const { error } = await sup.auth.signUp({ email: $('email').value, password: $('pass').value });
            if (error) $('msg').innerText = error.message; else init();
        };

        // Logout Logic
        $('logoutBtn').onclick = async () => { 
            await sup.auth.signOut(); 
            user = null; 
            init(); 
        };

        // Fetch User Data from Supabase
        async function loadData() {
            const { data, error } = await sup.from('profiles').select('*').eq('id', user.id).single();
            if (error && error.code === 'PGRST116') {
                await sup.from('profiles').insert([{ id: user.id, categories: profile.categories, logs: [] }]);
            } else if (data) {
                profile.categories = data.categories || profile.categories;
                profile.logs = data.logs || [];
            }
            renderUI();
        }

        // Save User Data to Supabase
        async function saveData() { 
            await sup.from('profiles').update({ logs: profile.logs }).eq('id', user.id); 
        }

        // Add a Task
        $('addBtn').onclick = async () => {
            if (!$('task').value) return;
            profile.logs.push({ id: Date.now(), text: $('task').value, cat: $('cat').value, done: false });
            $('task').value = ''; 
            renderUI(); 
            saveData();
        };

        // Checkmark Toggle
        window.toggle = async (id) => {
            let task = profile.logs.find(x => x.id == id);
            if (task) { task.done = !task.done; renderUI(); saveData(); }
        };

        // Delete Task
        window.del = async (id) => {
            profile.logs = profile.logs.filter(x => x.id != id); 
            renderUI(); 
            saveData();
        };

        // Draw the Interface
        function renderUI() {
            $('list').innerHTML = profile.categories.map(c => `
                <div class="bg-white p-5 rounded-lg shadow border border-gray-100">
                    <h3 class="font-bold border-b pb-2 mb-3 text-indigo-700 uppercase tracking-wider text-sm">${c}</h3>
                    <ul class="space-y-2">${profile.logs.filter(t => t.cat === c).map(t => `
                        <li class="flex justify-between items-center p-2 hover:bg-gray-50 rounded">
                            <label class="flex items-center gap-3 cursor-pointer w-full text-gray-700 ${t.done ? 'line-through text-gray-400 opacity-60' : ''}">
                                <input type="checkbox" class="w-5 h-5 text-indigo-600 rounded" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})"> 
                                <span class="break-words w-full">${t.text}</span>
                            </label>
                            <button onclick="del(${t.id})" class="text-red-400 hover:text-red-600 font-bold px-2">✕</button>
                        </li>`).join('') || '<li class="text-gray-400 text-sm italic p-2">Nothing added yet</li>'}
                    </ul>
                </div>`).join('');
        }

        // Start App
        init();
    </script>
</body>
</html>
