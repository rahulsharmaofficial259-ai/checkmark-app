<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckMark - Life Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase CDN -->

<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-check-circle text-2xl"></i>
                    <span class="font-bold text-xl tracking-wider">CheckMark</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-email" class="text-sm font-medium hidden sm:block"></span>
                    <button id="logoutBtn" class="hidden bg-indigo-800 hover:bg-indigo-900 px-4 py-2 rounded-md text-sm font-medium transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Authentication Section -->
    <main id="auth-section" class="max-w-md mx-auto px-4 py-16">
        <div class="bg-white rounded-xl shadow-md p-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Welcome to CheckMark</h2>
            <div id="auth-error" class="hidden bg-red-100 text-red-600 p-3 rounded-lg mb-4 text-sm text-center"></div>
            
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="emailInput" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="passwordInput" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                
                <div class="flex gap-4 pt-4">
                    <button type="button" id="loginBtn" class="flex-1 bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors font-medium">
                        Log In
                    </button>
                    <button type="button" id="signupBtn" class="flex-1 bg-white border-2 border-indigo-600 text-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-50 transition-colors font-medium">
                        Sign Up
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Main App Section -->
    <main id="app-section" class="max-w-4xl mx-auto px-4 py-8 hidden">
        
        <!-- Add Task Section -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-gray-100">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">Add New Task</h2>
            <form id="taskForm" class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="taskInput" placeholder="What do you need to do?" required
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                
                <select id="categorySelect" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    <!-- Options populated by JS -->
                </select>
                
                <button type="submit" id="submitBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors font-medium disabled:bg-gray-400">
                    Add Task
                </button>
            </form>
        </div>

        <!-- Dashboard Categories -->
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Categories will be injected here via JavaScript -->
        </div>
    </main>
